name: carpro
description: CarPro - Premium Car Marketplace for Iraq

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.6

  # HTTP & API
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.2

  # Image handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Video player (for reels)
  video_player: ^2.8.3
  chewie: ^1.7.4

  # URL launcher (WhatsApp, phone calls)
  url_launcher: ^6.2.5

  # Share functionality
  share_plus: ^7.2.2

  # Permissions
  permission_handler: ^11.3.0

  # Internationalization
  intl: ^0.19.0

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ── REQ 11: CarPro logo asset ──────────────────────────────────────
  assets:
    - assets/images/
    - assets/images/carpro_logo.png

  # App fonts (optional — remove if not using custom fonts)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
